<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Código Postal</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        h1, h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 15px;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
        }

        small {
            color: gray;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            margin-top: 20px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .resultado {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background: #f9f9f9;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Formulario Código Postal</h1>

        <form>

            <label for="cp">Código Postal:</label>

            <input 
                type="text"
                id="cp"
                name="cp"
                pattern="[0-9]{5}"
                placeholder="Ejemplo: 12345"
                required
            >

            <small>Debe contener exactamente 5 números.</small>

            <button type="submit">Enviar</button>

        </form>

        <!-- RESULTADO -->
        <div class="resultado">

            <h2>Resultado</h2>

            <p><strong>Código Postal ingresado:</strong> 12345</p>

        </div>

    </div>

</body>
</html>
